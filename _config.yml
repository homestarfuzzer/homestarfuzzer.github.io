# Site Settings
title: "homestarfuzzer"
tagline: "hacker. builder. breaker."
description: >-
  Security research, CTF writeups, and notes from a hacker who likes to break
  things and document what's left.
url: "https://homestarfuzzer.github.io"
baseurl: ""

author:
  name: Austin McNett
  handle: homestarfuzzer
  bio: >-
    Security researcher. I find bugs, break things, and write about it.
  email: ""
  github: homestarfuzzer
  twitter: ~
  linkedin: "austinmcnett"

# Build
theme: null
permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: "/blog/page/:num/"

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Collections
collections:
  writeups:
    output: true
    permalink: /writeups/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Austin McNett"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"
      author: "Austin McNett"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .devcontainer
  - node_modules
  - vendor

# SEO / Feed
logo: /assets/img/avatar.png
feed:
  path: feed.xml
