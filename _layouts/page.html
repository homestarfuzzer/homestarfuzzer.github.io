---
layout: default
---

<div class="page container">
  <header class="page__header">
    <h1 class="page__title">{{ page.title }}</h1>
    {%- if page.description %}
      <p class="page__desc">{{ page.description }}</p>
    {%- endif %}
  </header>

  <div class="page__body">
    {{ content }}
  </div>
</div>
